<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>

    <!--Font link-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <div class="top-msg">
        <h2>1USD TO NPR - Convert US Dollars To Rupees</h2>
        <h4>Currency Converter</h4>
      </div>
      <form>
        <div class="dropdown">
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <input value="1" type="text" />
              <img src="https://flagsapi.com/US/flat/64.png" alt="USD Flag" />
              <select name="from"></select>
            </div>
          </div>
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
          <div class="to">
            <p>To</p>
            <div class="select-container">
              <input value="1" type="text" />
              <img src="https://flagsapi.com/NP/flat/64.png" alt="NPR Flag" />
              <select name="to"></select>
            </div>
          </div>
        </div>
        <div class="msg">1USD = 153NPR</div>
        <div class="timer">Last updated: 2026/05/24</div>
      </form>
    </div>
    <script src="./codes.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
